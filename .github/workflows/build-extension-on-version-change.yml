name: Build Extension On Version Change

on:
  push:
    branches:
      - master
    paths:
      - package.json
      - manifest.json
      - scripts/**
      - .github/workflows/build-extension-on-version-change.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Detect version / packaging change
        id: version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const currentVersion = String(pkg.version || '').trim();
          let previousVersion = '';

          try {
            previousVersion = String(
              JSON.parse(cp.execSync('git show HEAD^:package.json', { encoding: 'utf8' })).version || ''
            ).trim();
          } catch (error) {
            previousVersion = '';
          }

          const versionBumped = currentVersion !== previousVersion;

          let packagingTouched = false;
          if (process.env.GITHUB_EVENT_NAME === 'push') {
            try {
              const names = cp
                .execSync('git diff --name-only HEAD^ HEAD', { encoding: 'utf8' })
                .trim()
                .split(/\r?\n/)
                .filter(Boolean);
              packagingTouched = names.some((f) => {
                return (
                  f.startsWith('scripts/') ||
                  f === '.github/workflows/build-extension-on-version-change.yml'
                );
              });
            } catch (e) {
              packagingTouched = false;
            }
          }

          const event = process.env.GITHUB_EVENT_NAME;
          const changed =
            event === 'workflow_dispatch' || versionBumped || packagingTouched;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `current=${currentVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `previous=${previousVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\n`);
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `reason=${versionBumped ? 'version' : packagingTouched ? 'packaging' : event === 'workflow_dispatch' ? 'dispatch' : 'none'}\n`,
          );
          NODE

      - name: Skip when nothing to build
        if: steps.version.outputs.changed != 'true'
        run: echo "未检测到版本号变化或打包流水线相关变更，跳过打包与发布。（手动发布请在 Actions 里执行 workflow_dispatch）"

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Build release directory
        if: steps.version.outputs.changed == 'true'
        run: npm run build:release

      - name: Create zip package
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          cd dist
          rm -f yishe-extensions.zip
          # 固定文件名，便于使用 releases/latest/download/yishe-extensions.zip 永久链接
          zip -r "yishe-extensions.zip" "yishe-extensions-v${VERSION}"

      - name: Upload workflow artifact
        if: steps.version.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: yishe-extensions-v${{ steps.version.outputs.current }}
          path: dist/yishe-extensions.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          TAG="v${VERSION}"
          FILE="dist/yishe-extensions.zip"

          NOTES=$(cat <<EOF
          自动打包的 YiShe 浏览器扩展版本 ${VERSION}。

          安装方式：
          1. 下载 zip 压缩包并解压。
          2. 打开 chrome://extensions/ 或 edge://extensions/。
          3. 开启开发者模式。
          4. 选择“加载已解压的扩展程序”，导入解压后的文件夹。

          提示：GitHub Release 提供的是源码压缩包，通常不能直接双击安装到浏览器中。
          EOF
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$FILE" --clobber
          else
            gh release create "$TAG" "$FILE" --title "YiShe Extensions v${VERSION}" --notes "$NOTES"
          fi
